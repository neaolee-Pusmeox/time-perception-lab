<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>时间感校准实验室</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
    }
    canvas#particle-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
    }
    .page {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10; padding: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .page.active { opacity: 1; pointer-events: auto; }
    .page h1 {
      font-size: 28px; font-weight: 700; text-align: center;
      margin-bottom: 16px; line-height: 1.4;
    }
    .page p {
      font-size: 16px; color: #a0a0b0; text-align: center;
      line-height: 1.6; max-width: 320px;
    }
    .btn {
      margin-top: 40px; padding: 14px 36px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px; color: #fff; font-size: 16px;
      cursor: pointer; transition: all 0.3s;
      backdrop-filter: blur(4px);
    }
    .btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
    .btn:active { transform: scale(0.96); }

    /* 说明页步骤 */
    .steps { list-style: none; margin: 24px 0; max-width: 300px; }
    .steps li {
      position: relative; padding: 12px 0 12px 36px;
      font-size: 15px; color: #c0c0d0; line-height: 1.5;
    }
    .steps li::before {
      content: attr(data-step);
      position: absolute; left: 0; top: 12px;
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #fff;
    }
    .hint { font-size: 13px !important; color: #606070 !important; margin-top: 20px; }

    /* 测试页 */
    .test-info { text-align: center; transition: opacity 0.5s; }
    .test-info h2 { font-size: 22px; margin-bottom: 12px; font-weight: 600; }
    .test-info .target-time { font-size: 48px; font-weight: 200; color: #fff; margin: 16px 0; }
    .test-info .target-label { font-size: 14px; color: #808090; }
    .tap-hint {
      position: fixed; bottom: 60px; left: 0; width: 100%;
      text-align: center; font-size: 13px; color: #505060;
      opacity: 0; transition: opacity 0.5s;
    }
    .tap-hint.visible { opacity: 1; }

    /* 单轮反馈 */
    .feedback { text-align: center; }
    .feedback .result-value { font-size: 42px; font-weight: 200; margin: 12px 0; }
    .feedback .result-detail { font-size: 15px; color: #a0a0b0; margin: 8px 0; }
    .feedback .result-comment { font-size: 14px; color: #707080; margin-top: 16px; font-style: italic; }

    /* 结果页 */
    #page-result { overflow-y: auto; justify-content: flex-start; padding-top: 60px; padding-bottom: 60px; }
    .result-section { width: 100%; max-width: 360px; margin-bottom: 40px; text-align: center; }
    .result-section h3 { font-size: 14px; color: #606070; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
    .big-number { font-size: 56px; font-weight: 200; color: #fff; }
    .big-number span { font-size: 24px; }
    .sub-stat { font-size: 15px; color: #a0a0b0; margin-top: 8px; line-height: 1.6; }
    .trend-chart { width: 100%; height: 80px; margin: 16px 0; }
    .trend-label { font-size: 15px; color: #c0c0d0; font-weight: 500; }
    .trend-desc { font-size: 13px; color: #707080; margin-top: 4px; }
    .character-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 24px; margin-top: 16px;
    }
    .character-card .char-name { font-size: 22px; font-weight: 600; color: #fff; }
    .character-card .char-tag { font-size: 13px; color: #a0a0b0; margin: 8px 0 16px; }
    .character-card .char-desc { font-size: 14px; color: #b0b0c0; line-height: 1.7; text-align: left; }
    .btn-group { display: flex; gap: 12px; margin-top: 32px; }
    .btn-group .btn { padding: 12px 24px; font-size: 14px; }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <!-- Page 1: 落地页 -->
  <div id="page-landing" class="page active">
    <h1>你的内在时钟<br>偏了多少？</h1>
    <p>闭上理性，用直觉感受时间的流逝</p>
    <button class="btn" onclick="goToPage('intro')">进入校准实验室</button>
  </div>

  <!-- Page 2: 说明页 -->
  <div id="page-intro" class="page">
    <h1>实验规则</h1>
    <ol class="steps">
      <li data-step="1">你会看到一段粒子动画，用直觉感受指定时长</li>
      <li data-step="2">当你觉得"时间到了"，点击屏幕任意位置</li>
      <li data-step="3">共三轮，每轮时长不同，测完揭晓你的时间人格</li>
    </ol>
    <p class="hint">建议佩戴耳机，保持安静环境</p>
    <button class="btn" onclick="startTest()">准备好了，开始第一轮</button>
  </div>

  <!-- Page 3: 测试页（三轮复用） -->
  <div id="page-test" class="page">
    <div class="test-info" id="test-info">
      <h2 id="round-label">第 1 轮</h2>
      <div class="target-label">感受</div>
      <div class="target-time" id="target-time">12</div>
      <div class="target-label">秒</div>
      <button class="btn" id="btn-ready" onclick="beginTiming()">我准备好了</button>
    </div>
    <div class="tap-hint" id="tap-hint">点击屏幕任意位置</div>
  </div>

  <!-- Page 4: 单轮反馈页 -->
  <div id="page-feedback" class="page">
    <div class="feedback">
      <h2 id="fb-round">第 1 轮结果</h2>
      <div class="result-value" id="fb-value">10.3 秒</div>
      <div class="result-detail" id="fb-detail">目标 12 秒 · 偏差 -1.7 秒</div>
      <div class="result-detail" id="fb-percent">快了 14%</div>
      <div class="result-comment" id="fb-comment">你的时间跑得比现实快一拍</div>
      <button class="btn" id="btn-next" onclick="nextRound()">进入下一轮</button>
    </div>
  </div>

  <!-- Page 5: 结果页 -->
  <div id="page-result" class="page">
    <div class="result-section">
      <h3>你的时间流速</h3>
      <div class="big-number" id="res-speed">快 11<span>%</span></div>
      <div class="sub-stat" id="res-equiv"></div>
      <div class="sub-stat" id="res-daily"></div>
    </div>
    <div class="result-section">
      <h3>三轮趋势</h3>
      <canvas class="trend-chart" id="trend-chart"></canvas>
      <div class="trend-label" id="trend-label"></div>
      <div class="trend-desc" id="trend-desc"></div>
    </div>
    <div class="result-section">
      <h3>你的时间人格</h3>
      <canvas id="character-canvas" width="300" height="300" style="margin: 0 auto;"></canvas>
      <div class="character-card" id="character-card">
        <div class="char-name" id="char-name"></div>
        <div class="char-tag" id="char-tag"></div>
        <div class="char-desc" id="char-desc"></div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="restart()">再测一次</button>
      <button class="btn" onclick="shareResult()">分享结果</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
